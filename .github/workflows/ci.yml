name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv sync --locked
      - run: uv run pytest
      - run: uv run ruff check .

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv build
      - run: uvx twine check dist/*
      - name: Install and import the wheel in isolation
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          uv run --isolated --no-project --with "$wheel" python -c \
            "import tex2markdown; print(tex2markdown.__version__)"
